<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback - Pine City Zoo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="header">
      <img
        src="https://images.unsplash.com/photo-1575382748191-7d1ba0230044?w=200&h=80&fit=crop"
        alt="Pine City Zoo Logo"
      />
    </div>
    <div id="tabs-top">
      <a href="animals.html">ANIMALS</a>
      <a href="index.html">MAP</a>
      <a href="places.html">PLACES</a>
    </div>
    <div id="main">
      <div id="content">
        <div id="info-box-full">
          <img
            src="https://images.unsplash.com/photo-1516383740770-fbcc5ccbece0?w=600&h=200&fit=crop"
            alt="Feedback"
          />
          <h3>WE'D LOVE TO HEAR FROM YOU</h3>
          <p>
            We always strive to do best, so your feedback is very important to
            us. Please fill in the form below
          </p>
          <form>
            <div>
              <label for="name">Name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Your name"
              />
            </div>
            <div>
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Your email"
              />
            </div>
            <div>
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                placeholder="Type your message here"
              ></textarea>
            </div>
          </form>
          <a class="button" href="message-received.html">SUBMIT</a>
          <a class="back-button" href="index.html">Back</a>
        </div>
      </div>
    </div>
    <div id="tabs-bottom">
      <a href="weather.html">WEATHER</a>
      <a href="feedback.html">FEEDBACK</a>
    </div>
  </body>
</html>
